<<div class="create-event-container">

  <header class="page-header">
    <button class="back-btn" routerLink="/home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
    <h2>Etkinlik Oluştur</h2>
  </header>

  <main class="form-wrapper">

    <div class="upload-area">
      <input type="file" id="fileInput" class="hidden-input" (change)="onFileSelected($event)" accept="image/*">

      <div class="upload-content">
        <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>

        <h4 *ngIf="!selectedFileName">Etkinlik Görseli Yükle</h4>
        <h4 *ngIf="selectedFileName" class="text-success">{{ selectedFileName }}</h4>

        <p>PNG, JPG veya WEBP (maks. 5MB)</p>

        <label for="fileInput" class="select-file-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          Dosya Seç
        </label>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" class="event-form">

      <div class="form-group">
        <label>Etkinlik Başlığı</label>
        <input type="text" placeholder="Etkinliğinize bir başlık verin" required>
      </div>

      <div class="form-group">
        <label>Kategori</label>
        <select required>
          <option value="" disabled selected>Bir kategori seçin</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Açıklama</label>
        <textarea placeholder="Etkinliğinizi detaylı bir şekilde tanıtın..." rows="4" required></textarea>
      </div>

      <div class="form-group">
        <label>Konum</label>
        <input type="text" placeholder="Etkinlik yeri (Örn: Amfi Tiyatro)" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Saat</label>
          <input type="time" required>
        </div>
        <div class="form-group">
          <label>Tarih</label>
          <input type="date" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Kontenjan</label>
          <input type="number" placeholder="Örn: 100" min="0">
        </div>
        <div class="form-group">
          <label>Fiyat (TL)</label>
          <input type="number" placeholder="0 = Ücretsiz" min="0">
        </div>
      </div>

      <button type="submit" class="submit-btn">Yükle</button>

    </form>
  </main>
</div>
