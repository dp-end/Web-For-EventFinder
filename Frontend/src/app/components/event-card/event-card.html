<div class="card" *ngIf="event" (click)="goToDetail()" style="cursor: pointer;">

  <div class="card-image-wrapper">
    <span class="price-badge" [ngClass]="{'free-badge': event.price === 'Ücretsiz'}">
      {{ event.price }}
    </span>
    <img [src]="event.imageUrl" [alt]="event.title" class="card-image">
  </div>

  <div class="card-body">
    <div class="club-info">
      <div class="club-avatar">{{ event.clubInitials }}</div>
      <span class="club-name">{{ event.clubName }}</span>
    </div>

    <h3 class="event-title">{{ event.title }}</h3>

    <div class="event-detail">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      <span>{{ event.date }}</span>
    </div>

    <div class="event-detail">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
      <span>{{ event.location }}</span>
    </div>
  </div>

  <div class="card-footer">
    <div class="interaction">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      {{ event.likes }}
    </div>
    <div class="interaction">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      {{ event.comments }}
    </div>
    <div class="interaction">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      {{ event.shares }}
    </div>
  </div>

</div>
